<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة ميار — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --border: #2a2a38;
    --accent: #c8a96e;
    --accent2: #e8c88e;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --text: #e8e8f0;
    --muted: #8888aa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a24 0%, #2a1a0a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .logo-text h1 {
    font-size: 18px;
    font-weight: 900;
    color: var(--accent2);
  }

  .logo-text p {
    font-size: 12px;
    color: var(--muted);
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 13px;
    color: var(--green);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .refresh-btn {
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }

  .refresh-btn:hover { background: var(--accent); color: #000; }

  /* Main */
  .main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* URL Config */
  .url-config {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .url-config label { color: var(--muted); font-size: 14px; white-space: nowrap; }

  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    direction: ltr;
  }

  .url-input:focus { outline: none; border-color: var(--accent); }

  .connect-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #000;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    white-space: nowrap;
  }

  /* Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .stat-card:hover { transform: translateY(-2px); }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    border-radius: 0 0 0 60px;
    opacity: 0.15;
  }

  .stat-card.gold::before { background: var(--accent); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.purple::before { background: var(--purple); }

  .stat-icon {
    font-size: 28px;
    margin-bottom: 12px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-card.gold .stat-value { color: var(--accent2); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.blue .stat-value { color: var(--blue); }
  .stat-card.purple .stat-value { color: var(--purple); }

  .stat-label { font-size: 13px; color: var(--muted); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }

  /* Content Grid */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-body { padding: 20px; }

  /* Orders Table */
  .orders-panel { grid-column: 1 / -1; }

  .orders-table {
    width: 100%;
    border-collapse: collapse;
  }

  .orders-table th {
    text-align: right;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .orders-table td {
    padding: 14px 16px;
    font-size: 14px;
    border-bottom: 1px solid rgba(42,42,56,0.5);
  }

  .orders-table tr:last-child td { border-bottom: none; }
  .orders-table tr:hover td { background: rgba(200,169,110,0.05); }

  .badge {
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-gold { background: rgba(200,169,110,0.15); color: var(--accent2); }
  .badge-green { background: rgba(74,222,128,0.15); color: var(--green); }
  .badge-blue { background: rgba(96,165,250,0.15); color: var(--blue); }

  /* Packs Chart */
  .pack-item {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .pack-label { font-size: 13px; width: 100px; }
  .pack-bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .pack-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.8s ease; }
  .pack-count { font-size: 13px; color: var(--muted); width: 30px; text-align: left; }

  /* Recent Activity */
  .activity-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(42,42,56,0.5);
  }

  .activity-item:last-child { border-bottom: none; }

  .activity-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .activity-text { font-size: 13px; }
  .activity-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }

  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-banner {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--red);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .content-grid { grid-template-columns: 1fr; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">📚</div>
    <div class="logo-text">
      <h1>مكتبة ميار</h1>
      <p>لوحة التحكم</p>
    </div>
  </div>
  <div style="display:flex;gap:12px;align-items:center">
    <div class="status-badge" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">جاري الاتصال...</span>
    </div>
    <button class="refresh-btn" onclick="loadAll()">🔄 تحديث</button>
  </div>
</div>

<div class="main">

  <!-- URL Config -->
  <div class="url-config">
    <label>🔗 رابط البوت:</label>
    <input type="text" class="url-input" id="botUrl" 
      value="https://maktaba-bot.onrender.com" 
      placeholder="https://maktaba-bot.onrender.com">
    <button class="connect-btn" onclick="loadAll()">اتصال</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card gold">
      <div class="stat-icon">💬</div>
      <div class="stat-value" id="totalConv">—</div>
      <div class="stat-label">محادثات إجمالية</div>
      <div class="stat-sub" id="todayConv">اليوم: —</div>
    </div>
    <div class="stat-card green">
      <div class="stat-icon">🛒</div>
      <div class="stat-value" id="totalOrders">—</div>
      <div class="stat-label">طلبيات إجمالية</div>
      <div class="stat-sub" id="todayOrders">اليوم: —</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon">👥</div>
      <div class="stat-value" id="activeConv">—</div>
      <div class="stat-label">محادثات نشطة</div>
      <div class="stat-sub">الآن</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-icon">💰</div>
      <div class="stat-value" id="totalRevenue">—</div>
      <div class="stat-label">مبيعات مقدّرة DT</div>
      <div class="stat-sub">بدون توصيل</div>
    </div>
  </div>

  <!-- Content Grid -->
  <div class="content-grid">

    <!-- Packs Stats -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📦 الباكجات الأكثر طلباً</div>
      </div>
      <div class="panel-body" id="packsChart">
        <div class="loading"><div class="spinner"></div> جاري التحميل...</div>
      </div>
    </div>

    <!-- Activity -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">⚡ آخر النشاطات</div>
        <span style="font-size:12px;color:var(--muted)" id="lastUpdate">—</span>
      </div>
      <div class="panel-body" id="activityFeed">
        <div class="loading"><div class="spinner"></div> جاري التحميل...</div>
      </div>
    </div>

    <!-- Orders Table -->
    <div class="panel orders-panel">
      <div class="panel-header">
        <div class="panel-title">🛒 الطلبيات المسجّلة</div>
        <span class="badge badge-green" id="ordersCount">0 طلبية</span>
      </div>
      <div id="ordersTableContainer">
        <div class="loading"><div class="spinner"></div> جاري التحميل...</div>
      </div>
    </div>

  </div>
</div>

<script>
const GRADES = {
  "1": { name: "السنة 1", price: 110 },
  "2": { name: "السنة 2", price: 120 },
  "3": { name: "السنة 3", price: 135 },
  "4": { name: "السنة 4", price: 145 },
  "5": { name: "السنة 5", price: 155 },
  "6": { name: "السنة 6", price: 165 },
};

let allOrders = [];
let statsData = {};

function getBotUrl() {
  return document.getElementById('botUrl').value.trim().replace(/\/$/, '');
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.style.display = 'block';
  el.textContent = '⚠️ ' + msg;
  setTimeout(() => el.style.display = 'none', 5000);
}

function setStatus(online) {
  const badge = document.getElementById('statusBadge');
  const text = document.getElementById('statusText');
  if (online) {
    badge.style.background = 'rgba(74,222,128,0.1)';
    badge.style.borderColor = 'rgba(74,222,128,0.3)';
    badge.style.color = 'var(--green)';
    text.textContent = 'البوت شغّال ✅';
  } else {
    badge.style.background = 'rgba(248,113,113,0.1)';
    badge.style.borderColor = 'rgba(248,113,113,0.3)';
    badge.style.color = 'var(--red)';
    text.textContent = 'غير متصل ❌';
  }
}

async function fetchStats() {
  try {
    const res = await fetch(getBotUrl() + '/stats');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    throw e;
  }
}

async function fetchOrders() {
  try {
    const res = await fetch(getBotUrl() + '/orders');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    throw e;
  }
}

function renderStats(data) {
  document.getElementById('totalConv').textContent = data.totalConversations || 0;
  document.getElementById('todayConv').textContent = `اليوم: ${data.todayConversations || 0}`;
  document.getElementById('totalOrders').textContent = data.totalOrders || 0;
  document.getElementById('todayOrders').textContent = `اليوم: ${data.todayOrders || 0}`;
  document.getElementById('activeConv').textContent = data.activeConversations || 0;
}

function renderOrders(orders) {
  const list = Array.isArray(orders) ? orders : Object.values(orders);
  allOrders = list;
  document.getElementById('ordersCount').textContent = list.length + ' طلبية';

  // Revenue
  const revenue = list.reduce((sum, o) => sum + (GRADES[o.grade]?.price || 0), 0);
  document.getElementById('totalRevenue').textContent = revenue;

  // Orders table
  const container = document.getElementById('ordersTableContainer');
  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>ما كاش طلبيات بعد</p></div>`;
    return;
  }

  container.innerHTML = `
    <table class="orders-table">
      <thead>
        <tr>
          <th>#</th>
          <th>الاسم</th>
          <th>العنوان</th>
          <th>الباكج</th>
          <th>السعر</th>
          <th>الوقت</th>
          <th>الحالة</th>
        </tr>
      </thead>
      <tbody>
        ${list.map((o, i) => `
          <tr>
            <td style="color:var(--muted)">${i+1}</td>
            <td><strong>${o.name || '—'}</strong></td>
            <td style="color:var(--muted);font-size:13px">${o.address || '—'}</td>
            <td><span class="badge badge-gold">${GRADES[o.grade]?.name || '—'}</span></td>
            <td style="color:var(--green);font-weight:700">${GRADES[o.grade]?.price || '—'} DT</td>
            <td style="color:var(--muted);font-size:12px">${o.time || '—'}</td>
            <td><span class="badge badge-green">✅ مؤكدة</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;

  renderPacksChart(list);
}

function renderPacksChart(orders) {
  const counts = {};
  orders.forEach(o => {
    if (o.grade) counts[o.grade] = (counts[o.grade] || 0) + 1;
  });
  const max = Math.max(...Object.values(counts), 1);

  const container = document.getElementById('packsChart');
  if (Object.keys(counts).length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">📊</div><p>ما كاش بيانات بعد</p></div>`;
    return;
  }

  container.innerHTML = Object.entries(GRADES).map(([g, info]) => `
    <div class="pack-item">
      <div class="pack-label">${info.name}</div>
      <div class="pack-bar-bg">
        <div class="pack-bar" style="width:${((counts[g]||0)/max*100)}%"></div>
      </div>
      <div class="pack-count">${counts[g] || 0}</div>
    </div>
  `).join('');
}

function renderActivity(stats, orders) {
  const activities = [];
  const now = Date.now();

  if (stats.totalConversations > 0) {
    activities.push({ dot: 'var(--blue)', text: `${stats.totalConversations} محادثة إجمالية`, time: 'إحصائية' });
  }
  if (stats.todayConversations > 0) {
    activities.push({ dot: 'var(--green)', text: `${stats.todayConversations} زبون جديد اليوم`, time: 'اليوم' });
  }
  if (stats.todayOrders > 0) {
    activities.push({ dot: 'var(--accent)', text: `${stats.todayOrders} طلبية جديدة اليوم 🎉`, time: 'اليوم' });
  }
  if (orders.length > 0) {
    const last = orders[orders.length - 1];
    activities.push({ dot: 'var(--purple)', text: `آخر طلبية: ${last.name || '—'} (${GRADES[last.grade]?.name || '—'})`, time: last.time || '—' });
  }

  if (activities.length === 0) {
    activities.push({ dot: 'var(--muted)', text: 'في انتظار أول زبون...', time: '' });
  }

  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ar-TN');
  document.getElementById('activityFeed').innerHTML = activities.map(a => `
    <div class="activity-item">
      <div class="activity-dot" style="background:${a.dot}"></div>
      <div>
        <div class="activity-text">${a.text}</div>
        <div class="activity-time">${a.time}</div>
      </div>
    </div>
  `).join('');
}

async function loadAll() {
  try {
    const [stats, orders] = await Promise.all([fetchStats(), fetchOrders()]);
    setStatus(true);
    statsData = stats;
    renderStats(stats);
    const ordersList = Array.isArray(orders) ? orders : Object.values(orders);
    renderOrders(orders);
    renderActivity(stats, ordersList);
  } catch (e) {
    setStatus(false);
    showError('ما قدرش يتصل بالبوت — تحقق من الرابط أو اتصال الإنترنت');
    document.getElementById('packsChart').innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>خطأ في الاتصال</p></div>`;
    document.getElementById('activityFeed').innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>خطأ في الاتصال</p></div>`;
    document.getElementById('ordersTableContainer').innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>خطأ في الاتصال</p></div>`;
  }
}

// تحديث تلقائي كل 30 ثانية
loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
